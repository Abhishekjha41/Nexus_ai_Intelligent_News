kind = "web"
previewPath = "/"
title = "AI News Platform"
version = "1.0.0"
id = "artifacts/news-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20376

[services.development]
run = "pnpm --filter @workspace/news-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/news-platform", "run", "build" ]
publicDir = "artifacts/news-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20376"
BASE_PATH = "/"
